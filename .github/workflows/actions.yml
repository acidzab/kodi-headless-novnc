name: Build Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The Kodi version'
        required: true
        type: string
        default: '22.0a3'
      codename:
        description: 'The Kodi codename'
        required: true
        type: string
        default: 'Piers'
      tag_latest:
        description: 'Tag as latest'
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_amd64:
    uses: ./.github/workflows/build.yml
    with:
      runs_on: ubuntu-24.04
      platform: linux/amd64
      tag: amd64
      version: ${{ github.event.inputs.version }}
      codename: ${{ github.event.inputs.codename }}
    secrets: inherit

  build_arm64:
    uses: ./.github/workflows/build.yml
    with:
      runs_on: ubuntu-24.04-arm
      platform: linux/arm64
      tag: arm64
      version: ${{ github.event.inputs.version }}
      codename: ${{ github.event.inputs.codename }}
    secrets: inherit

  build_arm32:
    uses: ./.github/workflows/build.yml
    with:
      runs_on: ubuntu-24.04-arm
      platform: linux/arm/v7
      tag: arm32
      version: ${{ github.event.inputs.version }}
      codename: ${{ github.event.inputs.codename }}
      cflags: '-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -mvectorize-with-neon-quad'
      with_cpu: '-DWITH_CPU=arm'
    secrets: inherit

  combine:
    needs: [build_amd64, build_arm64, build_arm32]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      -
        name: Create and push manifest images
        uses: int128/docker-manifest-create-action@v2
        with:
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.codename }}
            ${{ (github.event.inputs.tag_latest == 'true' && format('ghcr.io/{0}:latest', github.repository)) || '' }}
          sources: |
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}-amd64
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}-arm64
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}-arm32

  test:
    needs: [combine]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      -
        name: Pull and test image
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }}
          docker run --rm ghcr.io/${{ github.repository }}:${{ github.event.inputs.version }} \
            sh -c "ldd /usr/lib/kodi/kodi-x11 | ( ! grep -i 'not found' )"